<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBM – Centralized Backup Monitoring</title>
<style>

:root {
  --bg: #f4f6f9;
  --card: #ffffff;
  --ok: #16a34a;
  --ok-bg: #f0fdf4;
  --ok-border: #bbf7d0;
  --bad: #dc2626;
  --bad-bg: #fef2f2;
  --bad-border: #fecaca;
  --muted: #6b7280;
  --border: #e5e7eb;
  --border-hover: #9ca3af;
  --text: #111827;
  --navy: #1e2d3d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Segoe UI, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── HEADER ── */
header {
  background: var(--navy);
  color: white;
  padding: 18px 24px;
}

header h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 3px;
}

#updated {
  font-size: 11px;
  color: #94a3b8;
}

/* ── CONTAINER ── */
.container { padding: 20px 24px; }

/* ── SUMMARY STAT CARDS ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.scard {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color .15s;
}

.scard:hover { border-color: var(--border-hover); }
.scard.active-filter { border-color: var(--navy); box-shadow: 0 0 0 3px #cbd5e1; }

.scard .sv {
  font-size: 24px;
  font-weight: 700;
  line-height: 1;
}

.scard .sl {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.scard.ok-card .sv  { color: var(--ok); }
.scard.bad-card .sv { color: var(--bad); }
.scard.neutral .sv  { color: var(--text); }

/* ── REGION CARDS ── */
.region-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}

.region-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}

.region-card:hover { border-color: var(--border-hover); }

.region-card.selected {
  border-color: var(--navy);
  box-shadow: 0 0 0 3px #cbd5e1;
}

.region-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
}

.rdot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.rrow {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 3px;
}

.rrow span:first-child { color: var(--muted); }

.rbar {
  height: 5px;
  background: #e5e7eb;
  border-radius: 3px;
  margin: 8px 0;
  overflow: hidden;
}

.rbar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width .5s ease;
}

.rbtn-row {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}

.rbtn-row button {
  flex: 1;
  font-size: 11px;
  padding: 5px 0;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: background .12s, color .12s, border-color .12s;
}

.rbtn-row button:hover { background: #f3f4f6; }

.rbtn-row button.active-ok {
  background: var(--ok-bg);
  border-color: var(--ok-border);
  color: var(--ok);
  font-weight: 600;
}

.rbtn-row button.active-fail {
  background: var(--bad-bg);
  border-color: var(--bad-border);
  color: var(--bad);
  font-weight: 600;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.filter-bar input {
  flex: 1;
  min-width: 180px;
  padding: 9px 13px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 13px;
  font-family: inherit;
  background: var(--card);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}

.filter-bar input:focus { border-color: var(--navy); }
.filter-bar input::placeholder { color: #b0b8c4; }

.crumb {
  font-size: 12px;
  color: var(--muted);
  padding: 4px 11px;
  border-radius: 20px;
  background: #f3f4f6;
  border: 1px solid var(--border);
  display: none;
}

.crumb strong { color: var(--text); }

.clear-btn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  color: var(--muted);
  font-family: inherit;
  display: none;
}

.clear-btn:hover { background: #f3f4f6; }

.count-note {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}

/* ── CINEMA LIST ── */
.list {
  background: var(--card);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: auto;
  max-height: 60vh;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  border-bottom: 1px solid #f3f4f6;
  transition: background .1s;
}

.item:hover { background: #f9fafb; }
.item:last-child { border-bottom: none; }

.dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot.ok  { background: var(--ok); }
.dot.bad { background: var(--bad); }

.item-info { flex: 1; }

.name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge.ok   { background: var(--ok-bg);  color: var(--ok);  border: 1px solid var(--ok-border); }
.badge.bad  { background: var(--bad-bg); color: var(--bad); border: 1px solid var(--bad-border); }

.empty {
  text-align: center;
  padding: 36px;
  color: var(--muted);
  font-size: 13px;
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 14px;
  padding-bottom: 8px;
}

</style>
</head>
<body>

<header>
  <h2>CBM — Centralized Backup Monitoring</h2>
  <div id="updated">Loading...</div>
</header>

<div class="container">

  <div class="summary-grid">
    <div class="scard neutral" id="sc-total" onclick="setFilter('all','all')">
      <div class="sv" id="sv-total">—</div>
      <div class="sl">Total cinemas</div>
    </div>
    <div class="scard ok-card" id="sc-ok" onclick="setFilter('all','ok')">
      <div class="sv" id="sv-ok">—</div>
      <div class="sl">Backed up today</div>
    </div>
    <div class="scard bad-card" id="sc-bad" onclick="setFilter('all','missing')">
      <div class="sv" id="sv-bad">—</div>
      <div class="sl">Missing backup</div>
    </div>
    <div class="scard neutral" id="sc-rate">
      <div class="sv" id="sv-rate">—</div>
      <div class="sl">Success rate</div>
    </div>
  </div>

  <div id="regionGrid" class="region-grid"></div>

  <div class="filter-bar">
    <input id="search" placeholder="Search cinema name..." oninput="renderList()">
    <span class="crumb" id="crumb"></span>
    <button class="clear-btn" id="clear-btn" onclick="clearFilters()">Clear filter</button>
  </div>

  <div class="count-note" id="count-note"></div>
  <div id="list" class="list"></div>
  <div class="footer">Auto-refresh every 30 seconds</div>

</div>

<script>

let STATUS = null;
let INACTIVE = {};
let activeRegion = null;
let statusFilter = 'all';

const REGION_COLORS = {
  Asian: '#059669',
  TG:    '#0891b2',
  AP:    '#7c3aed',
  KA:    '#1a56db',
  City:  '#d97706',
};

function regionColor(name) {
  for (const [key, val] of Object.entries(REGION_COLORS)) {
    if (name.toLowerCase().includes(key.toLowerCase())) return val;
  }
  return '#6b7280';
}

document.addEventListener('DOMContentLoaded', () => {
  load();
  setInterval(load, 30000);
});

async function load() {
  try {
    const res = await fetch('data/status.json', { cache: 'no-store' });
    STATUS = await res.json();
    try {
      const ir = await fetch('inactive.json', { cache: 'no-store' });
      INACTIVE = await ir.json();
    } catch(e) {}
    document.getElementById('updated').textContent = 'Last updated: ' + STATUS.generated_at + ' · Auto-refresh every 30 seconds';
    buildRegions();
    renderList();
  } catch(e) { console.error(e); }
}

function setFilter(region, status) {
  activeRegion = region === 'all' ? null : region;
  statusFilter = status;

  // Update region card selection
  document.querySelectorAll('.region-card').forEach(c => c.classList.remove('selected'));
  if (activeRegion) {
    const el = document.getElementById('rc-' + activeRegion);
    if (el) el.classList.add('selected');
  }

  // Update region button highlights
  document.querySelectorAll('.rbtn-row button').forEach(b => b.classList.remove('active-ok', 'active-fail'));
  if (activeRegion && status !== 'all') {
    const btn = document.getElementById('rbtn-' + activeRegion + '-' + status);
    if (btn) btn.classList.add(status === 'ok' ? 'active-ok' : 'active-fail');
  }

  // Update summary card highlights
  document.querySelectorAll('.scard').forEach(c => c.classList.remove('active-filter'));
  if (region === 'all' && status === 'ok') document.getElementById('sc-ok').classList.add('active-filter');
  if (region === 'all' && status === 'missing') document.getElementById('sc-bad').classList.add('active-filter');

  updateCrumb();
  renderList();
}

function clearFilters() {
  activeRegion = null;
  statusFilter = 'all';
  document.getElementById('search').value = '';
  document.querySelectorAll('.region-card').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.rbtn-row button').forEach(b => b.classList.remove('active-ok', 'active-fail'));
  document.querySelectorAll('.scard').forEach(c => c.classList.remove('active-filter'));
  updateCrumb();
  renderList();
}

function updateCrumb() {
  const crumb = document.getElementById('crumb');
  const clearBtn = document.getElementById('clear-btn');
  if (activeRegion || statusFilter !== 'all') {
    let label = activeRegion || 'All regions';
    if (statusFilter === 'ok') label += ' — Backed up';
    if (statusFilter === 'missing') label += ' — Missing';
    crumb.innerHTML = '<strong>' + label + '</strong>';
    crumb.style.display = '';
    clearBtn.style.display = '';
  } else {
    crumb.style.display = 'none';
    clearBtn.style.display = 'none';
  }
}

function buildRegions() {
  const grid = document.getElementById('regionGrid');
  grid.innerHTML = '';
  let globalOk = 0, globalMissing = 0, globalTotal = 0;

  for (const [region, cinemas] of Object.entries(STATUS.regions)) {
    let total = 0, ok = 0, missing = 0;
    for (const [name, c] of Object.entries(cinemas)) {
      if (INACTIVE[region] && INACTIVE[region].includes(name)) continue;
      total++;
      if (c.status === 'ok') ok++;
      else missing++;
    }
    globalOk += ok;
    globalMissing += missing;
    globalTotal += total;

    const pct = total ? Math.round((ok / total) * 100) : 0;
    const color = regionColor(region);
    const isSelected = activeRegion === region;

    const card = document.createElement('div');
    card.className = 'region-card' + (isSelected ? ' selected' : '');
    card.id = 'rc-' + region;
    card.onclick = () => {
      if (activeRegion === region && statusFilter === 'all') {
        setFilter('all', 'all');
      } else {
        setFilter(region, 'all');
      }
    };

    card.innerHTML = `
      <div class="region-header">
        <span class="rdot" style="background:${color}"></span>
        ${region} Region
      </div>
      <div class="rrow"><span>Total</span><span>${total}</span></div>
      <div class="rrow"><span style="color:#166534">Synced</span><span style="color:#166534">${ok}</span></div>
      <div class="rrow"><span style="color:#dc2626">Failed</span><span style="color:#dc2626">${missing}</span></div>
      <div class="rbar"><div class="rbar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="rbtn-row">
        <button id="rbtn-${region}-ok"
          onclick="event.stopPropagation();setFilter('${region}','ok')"
          class="${isSelected && statusFilter==='ok' ? 'active-ok' : ''}">Synced</button>
        <button id="rbtn-${region}-missing"
          onclick="event.stopPropagation();setFilter('${region}','missing')"
          class="${isSelected && statusFilter==='missing' ? 'active-fail' : ''}">Failed</button>
      </div>
    `;
    grid.appendChild(card);
  }

  document.getElementById('sv-total').textContent = globalTotal;
  document.getElementById('sv-ok').textContent = globalOk;
  document.getElementById('sv-bad').textContent = globalMissing;
  document.getElementById('sv-rate').textContent = globalTotal ? Math.round((globalOk / globalTotal) * 100) + '%' : '—';
}

function renderList() {
  const list = document.getElementById('list');
  const query = document.getElementById('search').value.toLowerCase().trim();
  let html = '';
  let count = 0;

  for (const [region, cinemas] of Object.entries(STATUS.regions)) {
    if (activeRegion && region !== activeRegion) continue;
    for (const [name, c] of Object.entries(cinemas)) {
      if (INACTIVE[region] && INACTIVE[region].includes(name)) continue;
      if (statusFilter !== 'all' && c.status !== statusFilter) continue;
      if (query && !name.toLowerCase().includes(query)) continue;
      count++;
      const ok = c.status === 'ok';
      html += `
        <div class="item">
          <span class="dot ${ok ? 'ok' : 'bad'}"></span>
          <div class="item-info">
            <div class="name">${name}</div>
            <div class="sub">${region} &nbsp;·&nbsp; Last backup: ${c.last_backup || '—'}</div>
          </div>
          <span class="badge ${ok ? 'ok' : 'bad'}">${ok ? 'Backed up' : 'Missing'}</span>
        </div>`;
    }
  }

  document.getElementById('count-note').textContent = 'Showing ' + count + ' cinema' + (count !== 1 ? 's' : '');
  list.innerHTML = html || '<div class="empty">No cinemas match your filter.</div>';
}

document.getElementById('search').addEventListener('input', renderList);

</script>
</body>
</html>
